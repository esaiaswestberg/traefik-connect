services:
  receiver:
    image: traefik-connect
    build: .
    command:
      - receiver
      - --listen
      - :18180
      - --token
      - ${RECEIVER_TOKEN}
      - --state-dir
      - /state
      - --docker-socket
      - /var/run/docker.sock
      - --docker-network
      - traefik-connect
      - --stub-image
      - traefik-connect
    environment:
      # Shared bearer token used by worker snapshots and stub-to-worker proxy calls.
      RECEIVER_TOKEN: ${RECEIVER_TOKEN}
      # Durable snapshot and reconciliation state for the master receiver.
      RECEIVER_STATE_DIR: /state
      # Local Docker socket used to create, inspect, and remove master-side stub containers.
      RECEIVER_DOCKER_SOCKET: /var/run/docker.sock
      # Docker network used to attach the stub containers so Traefik can reach them.
      RECEIVER_DOCKER_NETWORK: traefik-connect
      # Image used for the stub containers that Traefik routes to.
      RECEIVER_STUB_IMAGE: traefik-connect
    volumes:
      - ./state:/state
      - /var/run/docker.sock:/var/run/docker.sock
    # Expose the receiver API on a dedicated host port.
    ports:
      - "18180:18180"
    networks:
      - traefik-connect

  traefik:
    image: traefik:v3
    command:
      - --configFile=/etc/traefik/traefik.yml
    environment:
      # Match the Docker API version supported by the host daemon.
      DOCKER_API_VERSION: "1.44"
    # Publish Traefik on the host ports used by the public ingress node.
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Static Traefik config, including entry points and the Docker provider.
      - ./examples/traefik-static.yml:/etc/traefik/traefik.yml:ro
      # ACME storage for Let’s Encrypt certificates.
      - ./acme:/etc/traefik/acme
      # Read-only Docker socket so Traefik can discover master-local stub containers.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - receiver
    networks:
      - traefik-connect

networks:
  # Shared network used by the receiver and stub containers on the master.
  traefik-connect:
    name: traefik-connect
