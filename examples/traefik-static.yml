# Static Traefik configuration for the master node.

entryPoints:
  # Public HTTP entry point used for ACME HTTP-01 and HTTP-to-HTTPS redirects.
  web:
    address: ":80"
    transport:
      respondingTimeouts:
        # Streaming and large uploads need explicit no-timeout defaults at the edge.
        readTimeout: 0s
        writeTimeout: 0s
        idleTimeout: 0s
  # Public HTTPS entry point used for real application traffic.
  websecure:
    address: ":443"
    transport:
      respondingTimeouts:
        # Keep HTTPS ingress equally permissive for long-lived streams.
        readTimeout: 0s
        writeTimeout: 0s
        idleTimeout: 0s

certificatesResolvers:
  # ACME resolver referenced by the worker example labels.
  letsencrypt:
    acme:
      # Replace this with a real email address if you want actual certificates.
      email: "test@example.com"
      # ACME storage persisted on the master.
      storage: /etc/traefik/acme/acme.json
      # Staging CA keeps the example safe to test without production issuance.
      caServer: https://acme-staging-v02.api.letsencrypt.org/directory
      httpChallenge:
        # ACME validation uses the plain HTTP entry point.
        entryPoint: web

serversTransport:
  # Tune the default backend transport for long uploads, streaming responses, and WebSockets.
  forwardingTimeouts:
    # Keep the connection establishment timeout explicit but still bounded.
    dialTimeout: 30s
    # Do not kill backends that take a while to produce their first byte.
    responseHeaderTimeout: 0s
    # Do not evict backend keep-alives while streaming or waiting between requests.
    idleConnTimeout: 0s

providers:
  docker:
    # Traefik discovers the master-local stub containers through the Docker socket.
    endpoint: unix:///var/run/docker.sock
    # Do not publish every container automatically; only the stub containers should be routed.
    exposedByDefault: false
    # Keep Traefik on the shared master network so it can reach the stubs.
    network: traefik-connect
  file:
    # Dynamic settings that need to be attached to services, such as the master-stub transport.
    filename: /etc/traefik/dynamic.yml
    watch: true

api:
  # Dashboard is useful during local testing and troubleshooting.
  dashboard: true
